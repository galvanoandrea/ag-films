<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galleria · AG FILMS</title>
  <meta name="description" content="Galleria fotografica AG Films. Foto sportive, street e drone da Como e oltre." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   AG FILMS — Site Styles
   ============================================================ */

/* --- Webfonts loaded via Google Fonts link tag --- */

:root {
  /* Primitives */
  --ag-black:        #0A0A0A;
  --ag-ink:          #141414;
  --ag-graphite:     #2D2D2D;
  --ag-fog:          #6B6B6B;
  --ag-mist:         #A8A8A8;
  --ag-bone:         #E6E6E6;
  --ag-paper:        #F5F5F5;
  --ag-white:        #FFFFFF;
  --ag-gold:         #D4AF37;
  --ag-gold-dim:     #8C7321;

  /* Semantic */
  --bg:              var(--ag-black);
  --bg-elevated:     var(--ag-ink);
  --fg:              var(--ag-bone);
  --fg-strong:       var(--ag-white);
  --fg-muted:        var(--ag-mist);
  --fg-quiet:        var(--ag-fog);
  --border:          var(--ag-graphite);
  --border-quiet:    rgba(255,255,255,0.08);
  --accent:          var(--ag-gold);

  /* Type */
  --font-display:    'Poppins', 'Helvetica Neue', Arial, sans-serif;
  --font-body:       'Montserrat', 'Helvetica Neue', Arial, sans-serif;
  --tracking-tight:  -0.01em;
  --tracking-wide:   0.08em;
  --tracking-wider:  0.16em;
  --tracking-widest: 0.28em;

  /* Spacing */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  24px;
  --space-6:  32px;
  --space-7:  48px;
  --space-8:  64px;
  --space-9:  96px;
  --space-10: 128px;

  /* Motion */
  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-inout: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast:   180ms;
  --dur-base:   320ms;
  --dur-slow:   600ms;
  --dur-cine:   900ms;

  --container-max: 1440px;
  --gutter: var(--space-7);
}

@media (max-width: 720px) {
  :root {
    --gutter: var(--space-5);
  }
}

/* ─── Reset ─── */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
img { display: block; max-width: 100%; }
button { font-family: inherit; }
a { color: inherit; text-decoration: none; }
::selection { background: var(--accent); color: var(--ag-black); }

.container {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--gutter);
}

/* ─── Type ─── */
.eyebrow {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
.eyebrow::before {
  content:''; width: 24px; height: 1px; background: currentColor;
}

h1, h2, h3, h4 {
  font-family: var(--font-display);
  font-weight: 300;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-strong);
  margin: 0;
}

.section-title {
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1.05;
  letter-spacing: var(--tracking-wider);
}

/* ─── Buttons ─── */
.btn {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  padding: 18px 32px;
  border-radius: 2px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--dur-fast) var(--ease-out);
  display: inline-flex;
  align-items: center;
  gap: 14px;
  white-space: nowrap;
  background: transparent;
  color: var(--fg);
}
.btn .arrow {
  display: inline-block; width: 16px; height: 1px; background: currentColor; position: relative;
  transition: width var(--dur-fast) var(--ease-out);
}
.btn .arrow::after {
  content:''; position: absolute; right: 0; top: -3px;
  width: 7px; height: 7px;
  border-right: 1px solid currentColor; border-top: 1px solid currentColor;
  transform: rotate(45deg);
}
.btn:hover .arrow { width: 26px; }

.btn-gold {
  background: var(--ag-gold);
  color: var(--ag-black);
  border-color: var(--ag-gold);
}
.btn-gold:hover {
  background: var(--ag-bone);
  border-color: var(--ag-bone);
}
.btn-outline {
  border-color: var(--ag-bone);
  color: var(--ag-bone);
}
.btn-outline:hover {
  color: var(--ag-gold);
  border-color: var(--ag-gold);
}
.btn-ghost {
  border-color: var(--border);
  color: var(--ag-mist);
  padding: 12px 22px;
}
.btn-ghost:hover { color: var(--ag-gold); border-color: var(--ag-gold); }

.btn-block {
  display: flex;
  width: 100%;
  justify-content: center;
}

/* ─── Chip / filter ─── */
.chip {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  padding: 11px 20px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--fg-muted);
  background: transparent;
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.chip:hover { color: var(--fg); border-color: var(--fg-muted); }
.chip.is-active {
  background: var(--ag-bone);
  color: var(--ag-black);
  border-color: var(--ag-bone);
}

/* ─── Form ─── */
.field { display: block; margin-bottom: var(--space-5); }
.field-label {
  display: block;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: 10px;
}
.field-input, .field-select {
  width: 100%;
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border);
  padding: 16px;
  font-family: var(--font-body);
  font-size: 15px;
  border-radius: 4px;
  outline: none;
  transition: border-color var(--dur-fast) var(--ease-out),
              box-shadow var(--dur-fast) var(--ease-out);
}
.field-input:focus, .field-select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.12);
}
.field-input::placeholder { color: var(--fg-quiet); }
.field-select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%23a8a8a8' stroke-width='1.5' d='M1 1l5 5 5-5'/></svg>");
  background-repeat: no-repeat;
  background-position: right 16px center;
  padding-right: 44px;
}
.field-hint {
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--fg-quiet);
  margin-top: 8px;
  line-height: 1.5;
}

/* ─── Header ─── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  height: 72px;
  transition: background var(--dur-base) var(--ease-out),
              backdrop-filter var(--dur-base) var(--ease-out),
              border-color var(--dur-base) var(--ease-out);
  border-bottom: 1px solid transparent;
}
.header.is-scrolled,
.header.is-solid {
  background: rgba(10,10,10,0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom-color: rgba(255,255,255,0.06);
}
.header-row {
  display: flex; align-items: center; gap: var(--space-7);
  height: 100%;
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--gutter);
}
.brand {
  display: flex; align-items: center; gap: 12px;
  color: inherit;
}
.brand img { width: 32px; height: 32px; }
.brand-wm {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: var(--tracking-widest);
  color: var(--fg);
}
.brand-wm .dim { color: var(--fg-quiet); font-weight: 300; }
.nav {
  display: flex; align-items: center; gap: 2px;
  margin-left: auto;
}
.nav a {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  padding: 10px 16px;
  color: var(--fg-muted);
  position: relative;
  transition: color var(--dur-fast) var(--ease-out);
}
.nav a::after {
  content:''; position: absolute;
  left: 16px; right: 16px; bottom: 4px;
  height: 1px; background: var(--accent);
  transform: scaleX(0); transform-origin: left;
  transition: transform var(--dur-base) var(--ease-out);
}
.nav a:hover, .nav a.is-active { color: var(--fg); }
.nav a:hover::after, .nav a.is-active::after { transform: scaleX(1); }
.nav-cta {
  margin-left: var(--space-4);
}

.burger {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  margin-left: auto;
  width: 40px; height: 40px;
  position: relative;
}
.burger span {
  position: absolute;
  left: 8px; right: 8px;
  height: 1px;
  background: var(--fg);
  transition: all var(--dur-base) var(--ease-out);
}
.burger span:nth-child(1) { top: 14px; }
.burger span:nth-child(2) { top: 20px; }
.burger span:nth-child(3) { top: 26px; }
.burger.is-open span:nth-child(1) { top: 20px; transform: rotate(45deg); }
.burger.is-open span:nth-child(2) { opacity: 0; }
.burger.is-open span:nth-child(3) { top: 20px; transform: rotate(-45deg); }

.mobile-menu {
  position: fixed;
  top: 72px; left: 0; right: 0;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-quiet);
  padding: var(--space-5) var(--gutter) var(--space-6);
  z-index: 49;
  display: none;
  flex-direction: column;
  gap: 4px;
}
.mobile-menu.is-open { display: flex; }
.mobile-menu a {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  padding: 16px 0;
  color: var(--fg);
  border-bottom: 1px solid var(--border-quiet);
}
.mobile-menu a.is-active { color: var(--accent); }
.mobile-menu .btn { margin-top: var(--space-5); justify-content: center; }

@media (max-width: 880px) {
  .nav, .nav-cta { display: none; }
  .burger { display: block; }
}

/* ─── Footer ─── */
.footer {
  background: var(--bg);
  padding: var(--space-9) 0 var(--space-5);
  border-top: 1px solid var(--border);
  margin-top: var(--space-10);
}
.footer-top {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: var(--space-7);
  padding-bottom: var(--space-8);
  border-bottom: 1px solid var(--border);
}
.footer-brand { display: flex; align-items: center; gap: 16px; margin-bottom: var(--space-4); }
.footer-mark { width: 44px; height: 44px; }
.footer-wm {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: var(--tracking-widest);
  color: var(--fg);
}
.footer-tag {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg-muted);
  max-width: 320px;
  line-height: 1.6;
}
.footer-col h4 {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 var(--space-5);
}
.footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
.footer-col a {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg-muted);
  transition: color var(--dur-fast) var(--ease-out);
}
.footer-col a:hover { color: var(--accent); }
.footer-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: var(--space-5);
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-quiet);
}
.footer-legal { display: flex; gap: var(--space-5); }
.footer-legal a { transition: color var(--dur-fast) var(--ease-out); }
.footer-legal a:hover { color: var(--accent); }

@media (max-width: 720px) {
  .footer-top { grid-template-columns: 1fr 1fr; gap: var(--space-6); }
  .footer-brand { grid-column: 1 / -1; }
  .footer-bottom { flex-direction: column; gap: var(--space-3); align-items: flex-start; }
}

/* ─── Photo card with watermark ─── */
.photo-card {
  position: relative;
  display: block;
  overflow: hidden;
  background: var(--bg-elevated);
  cursor: pointer;
  border: none;
  padding: 0;
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: inherit;
}
.photo-card .photo {
  position: relative;
  overflow: hidden;
  aspect-ratio: 4/5;
  background: #0a0a0a;
}
.photo-card .photo canvas,
.photo-card .photo img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform var(--dur-slow) var(--ease-out),
              filter var(--dur-slow) var(--ease-out);
}
.photo-card:hover .photo canvas,
.photo-card:hover .photo img {
  transform: scale(1.04);
  filter: brightness(1.06);
}

/* Watermark — diagonal grid overlay on each photo */
.watermark {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.watermark::before {
  content: '';
  position: absolute;
  inset: -50%;
  background-image:
    repeating-linear-gradient(
      -28deg,
      transparent 0,
      transparent 80px,
      rgba(0,0,0,0) 80px,
      rgba(0,0,0,0) 160px
    );
}
.watermark .wm-grid {
  position: absolute;
  inset: -50%;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  transform: rotate(-22deg);
  align-content: space-around;
  justify-items: center;
  gap: 60px 30px;
  opacity: 0.55;
}
.watermark .wm-grid span {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: 0.32em;
  color: rgba(255,255,255,0.42);
  text-shadow: 0 1px 1px rgba(0,0,0,0.4);
  white-space: nowrap;
}
.watermark .wm-corner {
  position: absolute;
  right: 14px;
  bottom: 14px;
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 0.32em;
  color: rgba(255,255,255,0.85);
  background: rgba(10,10,10,0.55);
  backdrop-filter: blur(4px);
  padding: 6px 10px;
  border: 1px solid rgba(255,255,255,0.12);
}

/* category tag on photo */
.photo-cat {
  position: absolute;
  top: 12px; left: 12px;
  z-index: 3;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  padding: 5px 9px;
  background: rgba(10,10,10,0.65);
  backdrop-filter: blur(8px);
  color: var(--accent);
  border: 1px solid rgba(212,175,55,0.35);
  text-transform: uppercase;
}

.photo-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  padding: 16px 0 4px;
}
.photo-meta .left {
  display: flex; flex-direction: column; gap: 6px;
  min-width: 0;
}
.photo-title {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 13px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg);
  transition: color var(--dur-fast) var(--ease-out);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.photo-card:hover .photo-title { color: var(--accent); }
.photo-loc {
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-quiet);
}
.photo-price {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--accent);
  white-space: nowrap;
}


/* ============================================================
   AG FILMS — Galleria & Modal styles
   ============================================================ */

.gallery-hero {
  padding: 160px 0 var(--space-8);
  background: var(--bg);
  position: relative;
}
.gallery-hero h1 {
  font-family: var(--font-display);
  font-weight: 200;
  font-size: clamp(56px, 9vw, 120px);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--fg-strong);
  line-height: 0.95;
  margin: 0 0 var(--space-5);
}
.gallery-hero p {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.65;
  color: var(--fg-muted);
  max-width: 560px;
  margin: 0;
}

/* Filter bar */
.filter-bar {
  position: sticky;
  top: 72px;
  z-index: 30;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-quiet);
  border-bottom: 1px solid var(--border-quiet);
  padding: var(--space-4) 0;
}
.filter-row {
  display: flex;
  gap: var(--space-3);
  align-items: center;
  flex-wrap: wrap;
}
.filter-row + .filter-row {
  margin-top: var(--space-3);
  padding-top: var(--space-3);
  border-top: 1px dashed var(--border-quiet);
}
.filter-label {
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 9px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-quiet);
  margin-right: 6px;
  flex-shrink: 0;
}
.filter-count {
  margin-left: auto;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-quiet);
}

/* event chip — slimmer than category chips, with a date suffix */
.chip-event {
  font-size: 10px;
  padding: 8px 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  letter-spacing: var(--tracking-wider);
}
.chip-event .ev-date {
  color: var(--fg-quiet);
  font-size: 9px;
  letter-spacing: 0.16em;
}
.chip-event.is-active .ev-date {
  color: var(--ag-black);
  opacity: 0.55;
}
.chip-event .ev-cat-dot {
  display: inline-block;
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.chip-event.is-active .ev-cat-dot { background: var(--ag-black) !important; opacity: 0.6; }

/* category-color dots */
.cat-dot-sport  { background: #d9a23c; }
.cat-dot-street { background: #7fb8d8; }
.cat-dot-drone  { background: #bcd0b0; }

@media (max-width: 720px) {
  .filter-bar { padding: var(--space-3) 0; }
  .filter-row { gap: 8px; }
  .filter-count {
    flex-basis: 100%;
    margin-left: 0;
    text-align: right;
    margin-top: 4px;
  }
}

/* Gallery grid */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-5);
  padding-top: var(--space-7);
  padding-bottom: var(--space-9);
}
.gallery-grid .photo-card .photo {
  aspect-ratio: 4/5;
}
@media (max-width: 880px) {
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-4); }
}
@media (max-width: 560px) {
  .gallery-grid { grid-template-columns: 1fr; }
}

.gallery-empty {
  text-align: center;
  padding: var(--space-9) var(--gutter);
  color: var(--fg-muted);
  font-family: var(--font-body);
  font-size: 14px;
  letter-spacing: var(--tracking-wide);
}

/* ─── Modal ─── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 100;
  display: flex;
  align-items: stretch;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--dur-base) var(--ease-out);
  overflow-y: auto;
}
.modal-backdrop.is-open {
  opacity: 1;
  pointer-events: auto;
}
.modal {
  position: relative;
  width: 100%;
  max-width: 1280px;
  margin: auto;
  padding: var(--space-7) var(--gutter);
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: var(--space-7);
  align-items: start;
  transform: translateY(20px);
  transition: transform var(--dur-base) var(--ease-out);
}
.modal-backdrop.is-open .modal {
  transform: translateY(0);
}

@media (max-width: 880px) {
  .modal { grid-template-columns: 1fr; gap: var(--space-5); padding: var(--space-6) var(--gutter); }
}

.modal-close {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 101;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(10,10,10,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  color: var(--fg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--dur-fast) var(--ease-out);
}
.modal-close:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.modal-close svg { width: 16px; height: 16px; }

.modal-photo {
  position: relative;
  background: var(--bg-elevated);
  border: 1px solid var(--border-quiet);
  overflow: hidden;
}
.modal-photo .photo-wrap {
  position: relative;
  aspect-ratio: 4/5;
  overflow: hidden;
}
.modal-photo canvas {
  width: 100%; height: 100%;
  display: block;
  object-fit: cover;
}
.modal-photo .photo-cat {
  top: 16px;
  left: 16px;
}

.modal-side {
  padding: var(--space-3) 0;
}
.modal-eyebrow {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: var(--space-4);
}
.modal-title {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(28px, 3.5vw, 44px);
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-strong);
  line-height: 1.05;
  margin: 0 0 var(--space-3);
}
.modal-loc {
  font-family: var(--font-body);
  font-size: 12px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-muted);
  margin: 0 0 var(--space-7);
}

.modal-specs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: var(--space-7);
}
.modal-spec {
  background: var(--bg);
  padding: var(--space-4) var(--space-5);
}
.modal-spec dt {
  font-family: var(--font-body);
  font-size: 9px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-quiet);
  margin-bottom: 6px;
}
.modal-spec dd {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 14px;
  letter-spacing: var(--tracking-wide);
  color: var(--fg);
  margin: 0;
}

.modal-price-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--space-4);
  padding: var(--space-5) 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--space-6);
}
.modal-price-label {
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-quiet);
}
.modal-price {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 42px;
  letter-spacing: 0.02em;
  color: var(--accent);
}

.modal-features {
  list-style: none;
  padding: 0;
  margin: 0 0 var(--space-7);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.modal-features li {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: 12px;
  letter-spacing: 0.02em;
}
.modal-features li::before {
  content: '';
  width: 4px;
  height: 4px;
  background: var(--accent);
  display: inline-block;
}

.modal-buy {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--ag-gold);
  color: var(--ag-black);
  border: 1px solid var(--ag-gold);
  padding: 20px 28px;
  width: 100%;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  justify-content: center;
  transition: all var(--dur-fast) var(--ease-out);
}
.modal-buy:hover {
  background: var(--ag-bone);
  border-color: var(--ag-bone);
}
.modal-buy svg {
  width: 16px;
  height: 16px;
}
.modal-buy-note {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: var(--space-4);
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-quiet);
  justify-content: center;
}
.modal-buy-note .badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.modal-buy-note svg {
  width: 11px;
  height: 11px;
}

/* Modal — success state */
.modal-success {
  text-align: center;
  padding: var(--space-7) 0;
}
.modal-success-mark {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: var(--space-6);
  color: var(--accent);
  position: relative;
  animation: ring-in 0.5s var(--ease-out);
}
@keyframes ring-in {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.modal-success-mark svg {
  width: 28px;
  height: 28px;
}
.modal-success-title {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 28px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-strong);
  margin: 0 0 var(--space-3);
}
.modal-success-sub {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--fg-muted);
  margin: 0 auto var(--space-7);
  max-width: 360px;
}
.dl-card {
  border: 1px solid var(--border);
  background: var(--bg);
  padding: var(--space-5);
  display: flex;
  align-items: center;
  gap: var(--space-4);
  border-radius: 4px;
  margin-bottom: var(--space-5);
  text-align: left;
}
.dl-icon {
  width: 44px;
  height: 44px;
  border-radius: 4px;
  background: rgba(212,175,55,0.08);
  border: 1px solid rgba(212,175,55,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.dl-icon svg { width: 18px; height: 18px; }
.dl-text {
  flex: 1;
  min-width: 0;
}
.dl-name {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dl-meta {
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-quiet);
}
.dl-btn {
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  padding: 10px 16px;
  border-radius: 2px;
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.dl-btn:hover {
  background: var(--accent);
  color: var(--ag-black);
}
.dl-expires {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--fg-muted);
  justify-content: center;
  padding-top: var(--space-3);
  border-top: 1px solid var(--border-quiet);
}
.dl-expires .pulse {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ─── Payment step ─── */
.modal-pay-overlay {
  text-align: center;
  padding: var(--space-6) 0;
}
.modal-pay-status {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: var(--tracking-widest);
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: var(--space-6);
}
.spinner {
  width: 18px;
  height: 18px;
  border: 1px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.stripe-mock {
  border: 1px solid var(--border);
  background: var(--bg);
  border-radius: 6px;
  padding: var(--space-5);
  margin: 0 auto;
  max-width: 380px;
  text-align: left;
}
.stripe-mock-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-5);
  padding-bottom: var(--space-4);
  border-bottom: 1px solid var(--border-quiet);
}
.stripe-mock-logo {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
  color: #635bff;
}
.stripe-mock-secure {
  font-family: var(--font-body);
  font-size: 9px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-quiet);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.stripe-mock-row {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 12px;
  border: 1px solid var(--border-quiet);
  border-radius: 4px;
  margin-bottom: 10px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg);
}
.stripe-mock-row .pill {
  margin-left: auto;
  font-family: var(--font-body);
  font-size: 9px;
  letter-spacing: var(--tracking-wider);
  text-transform: uppercase;
  color: var(--fg-quiet);
}
.stripe-mock-row.is-selected {
  border-color: var(--accent);
  background: rgba(212,175,55,0.04);
}
.stripe-mock-row svg { width: 22px; height: auto; }

  <script>
  // photo-engine.js
/* ============================================================
   AG FILMS — Procedural photo generator
   Produces cinematic abstract images per category as canvas
   data URLs. Each photo has a stable seed so it looks the same
   on every render. Output is meant as a placeholder for real
   photography — color grading inspired by sport/street/drone.
   ============================================================ */

(function () {
  function mulberry32(seed) {
    return function () {
      var t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // Palette per category — color graded for AG Films cinematic mood
  const PALETTES = {
    sport: [
      ['#0a0e14', '#1a2530', '#3a5a78', '#d9a23c', '#e8d9a8'], // golden hour stadium
      ['#04060a', '#0e2030', '#1a4860', '#7fb8d8', '#f0e6c8'], // pool / cyan
      ['#0a0908', '#1a1410', '#5a3a20', '#d4661f', '#f5d9a0'], // sunset trail
      ['#080808', '#1a1a1a', '#3a3a3a', '#a8a8a8', '#e6e6e6'], // BW
    ],
    street: [
      ['#06070a', '#181818', '#2a2622', '#c89060', '#e8c878'], // tungsten lamp
      ['#0a0a0a', '#1a1a1a', '#2d2d2d', '#6b6b6b', '#d4af37'], // gold accent moody
      ['#040404', '#101418', '#1c2632', '#3a5878', '#9bbcd8'], // blue hour
      ['#0a0805', '#1a1410', '#3a2820', '#7a5a3a', '#d8b078'], // amber neon
    ],
    drone: [
      ['#0a1018', '#1a2838', '#2c4258', '#6890b0', '#c8d8e8'], // alpine
      ['#0a0e0a', '#142018', '#284838', '#6a8870', '#bcd0b0'], // forest
      ['#0a0c0e', '#1a2028', '#384858', '#7898b8', '#d4c890'], // mountain ridge
      ['#0a0808', '#181410', '#382818', '#a06038', '#e8c068'], // desert / sunset
    ],
  };

  // ─── Photo composer: layered light + color + grain ───
  function composePhoto(canvas, opts) {
    const { seed, category } = opts;
    const rand = mulberry32(seed);
    const palettes = PALETTES[category] || PALETTES.sport;
    const palette = palettes[Math.floor(rand() * palettes.length)];
    const w = canvas.width, h = canvas.height;
    const ctx = canvas.getContext('2d');

    // base gradient
    const baseStyle = Math.floor(rand() * 3);
    if (baseStyle === 0) {
      const g = ctx.createLinearGradient(0, 0, 0, h);
      g.addColorStop(0, palette[1]);
      g.addColorStop(1, palette[0]);
      ctx.fillStyle = g;
    } else if (baseStyle === 1) {
      const g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0, palette[2]);
      g.addColorStop(1, palette[0]);
      ctx.fillStyle = g;
    } else {
      const g = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, w * 0.8);
      g.addColorStop(0, palette[2]);
      g.addColorStop(1, palette[0]);
      ctx.fillStyle = g;
    }
    ctx.fillRect(0, 0, w, h);

    // light blobs — 3-6 soft elliptical highlights
    const blobs = 3 + Math.floor(rand() * 4);
    for (let i = 0; i < blobs; i++) {
      const cx = rand() * w;
      const cy = rand() * h;
      const r = (0.15 + rand() * 0.5) * Math.max(w, h);
      const colorIdx = 2 + Math.floor(rand() * 3);
      const color = palette[colorIdx];
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, color + 'cc');
      g.addColorStop(0.4, color + '40');
      g.addColorStop(1, color + '00');
      ctx.fillStyle = g;
      ctx.globalCompositeOperation = i % 2 === 0 ? 'screen' : 'lighter';
      ctx.fillRect(0, 0, w, h);
    }
    ctx.globalCompositeOperation = 'source-over';

    // dark vignette
    const vg = ctx.createRadialGradient(w * 0.5, h * 0.55, w * 0.3, w * 0.5, h * 0.5, w * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.65)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, w, h);

    // subject silhouette per category
    drawSubject(ctx, w, h, category, rand, palette);

    // grain
    const grain = ctx.getImageData(0, 0, w, h);
    const data = grain.data;
    for (let i = 0; i < data.length; i += 4) {
      const n = (Math.random() - 0.5) * 18;
      data[i] = clamp(data[i] + n);
      data[i+1] = clamp(data[i+1] + n);
      data[i+2] = clamp(data[i+2] + n);
    }
    ctx.putImageData(grain, 0, 0);

    // bottom shadow gradient (cinematic crush)
    const bg = ctx.createLinearGradient(0, h * 0.5, 0, h);
    bg.addColorStop(0, 'rgba(0,0,0,0)');
    bg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
  }

  function clamp(v) { return v < 0 ? 0 : (v > 255 ? 255 : v); }

  function drawSubject(ctx, w, h, category, rand, palette) {
    ctx.save();
    if (category === 'drone') {
      // horizon line + mountain silhouettes
      const horizon = h * (0.45 + rand() * 0.2);
      ctx.fillStyle = palette[0];
      const peaks = 3 + Math.floor(rand() * 3);
      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, horizon);
      for (let i = 0; i <= peaks; i++) {
        const x = (i / peaks) * w;
        const y = horizon - rand() * h * 0.18;
        if (i === 0) ctx.lineTo(x, y);
        else {
          const cx = x - w / (peaks * 2);
          ctx.quadraticCurveTo(cx, horizon - rand() * h * 0.05, x, y);
        }
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fillStyle = palette[0] + 'cc';
      ctx.fill();
      // foreground darker
      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, horizon + h * 0.12);
      for (let i = 0; i <= 4; i++) {
        const x = (i / 4) * w;
        const y = horizon + h * 0.12 + rand() * h * 0.08;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fillStyle = '#000000aa';
      ctx.fill();
    } else if (category === 'sport') {
      // motion-blur streaks suggesting an athlete in action
      const streaks = 4 + Math.floor(rand() * 3);
      for (let i = 0; i < streaks; i++) {
        const y = (0.3 + rand() * 0.5) * h;
        const len = (0.3 + rand() * 0.5) * w;
        const x = rand() * (w - len);
        const grad = ctx.createLinearGradient(x, y, x + len, y);
        grad.addColorStop(0, palette[4] + '00');
        grad.addColorStop(0.5, palette[4] + '50');
        grad.addColorStop(1, palette[4] + '00');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y - (1 + rand() * 4), len, 2 + rand() * 6);
      }
      // a faint silhouette
      const cx = w * (0.3 + rand() * 0.4);
      const cy = h * (0.55 + rand() * 0.2);
      ctx.fillStyle = '#00000099';
      ctx.beginPath();
      ctx.ellipse(cx, cy + h * 0.15, w * 0.12, h * 0.05, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(cx - w * 0.04, cy - h * 0.12, w * 0.08, h * 0.18);
    } else if (category === 'street') {
      // architectural verticals + glow window
      const cols = 2 + Math.floor(rand() * 3);
      for (let i = 0; i < cols; i++) {
        const x = (i / cols) * w + rand() * w * 0.15;
        const wid = w * (0.04 + rand() * 0.1);
        ctx.fillStyle = '#000000' + Math.floor(60 + rand() * 80).toString(16);
        ctx.fillRect(x, 0, wid, h);
      }
      // window glow
      const wx = w * (0.4 + rand() * 0.4);
      const wy = h * (0.25 + rand() * 0.2);
      const ww = w * 0.08;
      const wh = h * 0.12;
      const wg = ctx.createRadialGradient(wx + ww/2, wy + wh/2, 0, wx + ww/2, wy + wh/2, ww * 2);
      wg.addColorStop(0, palette[3] + 'cc');
      wg.addColorStop(1, palette[3] + '00');
      ctx.fillStyle = wg;
      ctx.fillRect(wx - ww, wy - wh, ww * 3, wh * 3);
      ctx.fillStyle = palette[4] + 'aa';
      ctx.fillRect(wx, wy, ww, wh);
    }
    ctx.restore();
  }

  // Render into a target element (replaces inner)
  function renderPhoto(target, opts) {
    const w = opts.width || 600;
    const h = opts.height || 750;
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    canvas.setAttribute('aria-hidden', 'true');
    composePhoto(canvas, opts);
    target.innerHTML = '';
    target.appendChild(canvas);
    return canvas;
  }

  window.AGPhoto = { renderPhoto, composePhoto };
})();

  </script>

  // galleria.js
/* ============================================================
   AG FILMS — Galleria & Modal logic (vanilla JS)
   ============================================================ */

(function () {
  let activeCat = 'all';
  let activeEvent = 'all';   // event id or 'all'
  let modalState = 'preview'; // 'preview' | 'paying' | 'success'
  let currentPhoto = null;

  AGChrome.mount('galleria');

  // Parse query
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('cat')) activeCat = urlParams.get('cat');
  if (urlParams.get('event')) activeEvent = urlParams.get('event');
  const openId = urlParams.get('id');

  function syncURL() {
    const url = new URL(window.location);
    if (activeCat === 'all') url.searchParams.delete('cat');
    else url.searchParams.set('cat', activeCat);
    if (activeEvent === 'all') url.searchParams.delete('event');
    else url.searchParams.set('event', activeEvent);
    window.history.replaceState({}, '', url);
  }

  // ─── Filter bar ───
  const catRow = document.getElementById('filter-cat-row');
  const eventRow = document.getElementById('filter-event-row');

  function renderCatRow() {
    catRow.innerHTML = '';
    const label = document.createElement('span');
    label.className = 'filter-label';
    label.textContent = 'Categoria';
    catRow.appendChild(label);

    AG_CATEGORIES.forEach(c => {
      const btn = document.createElement('button');
      btn.className = `chip ${c.id === activeCat ? 'is-active' : ''}`;
      btn.textContent = c.label;
      btn.addEventListener('click', () => {
        activeCat = c.id;
        // Reset event when category changes — unless the active event still belongs
        const ev = AG_EVENTS.find(e => e.id === activeEvent);
        if (!ev || (c.id !== 'all' && ev.cat !== c.id)) activeEvent = 'all';
        syncURL();
        renderAll();
      });
      catRow.appendChild(btn);
    });

    const count = document.createElement('div');
    count.className = 'filter-count';
    const n = filteredPhotos().length;
    count.textContent = `${n} foto`;
    catRow.appendChild(count);
  }

  function renderEventRow() {
    eventRow.innerHTML = '';
    const events = window.eventsForCat(activeCat);

    const label = document.createElement('span');
    label.className = 'filter-label';
    label.textContent = 'Evento';
    eventRow.appendChild(label);

    // "Tutti gli eventi" chip
    const all = document.createElement('button');
    all.className = `chip chip-event ${activeEvent === 'all' ? 'is-active' : ''}`;
    all.innerHTML = `<span>Tutti gli eventi</span><span class="ev-date">${events.length}</span>`;
    all.addEventListener('click', () => {
      activeEvent = 'all';
      syncURL();
      renderAll();
    });
    eventRow.appendChild(all);

    events.forEach(ev => {
      const btn = document.createElement('button');
      btn.className = `chip chip-event ${ev.id === activeEvent ? 'is-active' : ''}`;
      const showDot = activeCat === 'all';
      btn.innerHTML = `
        ${showDot ? `<span class="ev-cat-dot cat-dot-${ev.cat}"></span>` : ''}

        <span class="ev-date">${ev.dateLabel}</span>
      `;
      btn.addEventListener('click', () => {
        activeEvent = ev.id;
        // If a category is "all" but we picked an event, narrow the category for clarity
        if (activeCat === 'all') activeCat = ev.cat;
        syncURL();
        renderAll();
      });
      eventRow.appendChild(btn);
    });
  }

  function filteredPhotos() {
    let list = AG_PHOTOS;
    if (activeCat !== 'all') list = list.filter(p => p.cat === activeCat);
    if (activeEvent !== 'all') list = list.filter(p => p.event === activeEvent);
    return list;
  }

  function renderAll() {
    renderCatRow();
    renderEventRow();
    renderGrid();
  }

  // ─── Grid ───
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');

  function renderGrid() {
    const photos = filteredPhotos();
    grid.innerHTML = '';
    empty.style.display = photos.length ? 'none' : 'block';

    photos.forEach(p => {
      const card = document.createElement('button');
      card.className = 'photo-card';

      card.setAttribute('data-id', p.id);
      card.innerHTML = `
        <div class="photo">

            <div class="wm-grid">

      const c = document.createElement('canvas');
      c.width = 1200;
      c.height = 1500;
      AGPhoto.composePhoto(c, { seed: p.seed, category: p.cat });
      wrap.insertBefore(c, wrap.firstChild);

      // Compute expiration
      const d = new Date();
      d.setHours(d.getHours() + 48);
      const fmt = d.toLocaleString('it-IT', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      document.getElementById('expires-when').textContent = fmt;
    }
  }

  function startPayment() {
    modalState = 'paying';
    renderModal();
  }

  // ─── Init ───
  renderAll();
  if (openId) {
    const p = AG_PHOTOS.find(x => x.id === openId);
    if (p) {
      setTimeout(() => openModal(p), 150);
    }
  }
})();

  </script>
</body>
</html>
